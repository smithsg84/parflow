name: Build ParFlow

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: true
      matrix:
        config:
        - {
            name: "Ubuntu 18.04 CUDA", artifact: "linux-gcc.tar.xz",
            os: ubuntu-18.04,
            cc: "gcc", cxx: "g++",
            python: "false",
            backend: "cuda",
            cudaos: 'ubuntu1804'
          }
    steps:
    - uses: actions/checkout@v2

    - name: Package Install
      run: sudo apt install gfortran libhdf5-openmpi-dev libhdf5-openmpi-100 hdf5-helpers tcl-dev tk-dev

    - name: Directory Setup
      run: |
        mkdir -p $PWD/install
        echo "PARFLOW_DIR=$PWD/install" >> $GITHUB_ENV
        echo "Setting PARFLOW_DIR=$PWD/install"
        echo "PARFLOW_DEP_DIR=$PWD/depend" >> $GITHUB_ENV
        echo "Setting PARFLOW_DEP_DIR=$PWD/depend"

    - name: CMake Install
      run: |
        wget --no-check-certificate http://cmake.org/files/v3.14/cmake-3.14.0-Linux-x86_64.tar.gz
        tar -xf cmake-3.14.0-Linux-x86_64.tar.gz
        echo "$PWD/cmake-3.14.0-Linux-x86_64/bin/" >> $GITHUB_PATH

    - name: CUDA Install
      if: matrix.config.backend == 'cuda'
      run: |
        CUDA_SHORT=10.1
        CUDA_VER=10.1.105-1
        wget http://developer.download.nvidia.com/compute/cuda/repos/${{ matrix.config.cudaos }}/x86_64/cuda-repo-${{ matrix.config.cudaos }}_${CUDA_VER}_amd64.deb
        sudo dpkg -i cuda-repo-${{ matrix.config.cudaos }}_${CUDA_VER}_amd64.deb;
        sudo apt-key adv --fetch-keys http://developer.download.nvidia.com/compute/cuda/repos/${{ matrix.config.cudaos }}/x86_64/7fa2af80.pub
        sudo apt update -qq
        sudo apt install -y cuda-core-${CUDA_SHORT/./-} cuda-cudart-dev-${CUDA_SHORT/./-} cuda-nvtx-${CUDA_SHORT/./-}
        echo "CUDA_HOME=/usr/local/cuda-${CUDA_SHORT}" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=${CUDA_HOME}/lib64:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
        echo "LIBRARY_PATH=${CUDA_HOME}/lib64/stubs" >> $GITHUB_ENV
        echo "${CUDA_HOME}/bin" >> $GITHUB_PATH
        echo "/foo/bin" >> $GITHUB_PATH 

    - name: Message
      run: |
        echo $PATH
        printenv
        which nvcc
