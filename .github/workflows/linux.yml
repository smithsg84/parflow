name: Build ParFlow

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: true
      matrix:
        config:
        - {
            name: "Ubuntu 18.04", artifact: "linux-gcc.tar.xz",
            os: ubuntu-18.04,
            cc: "gcc", cxx: "g++",
            python: "false",
            backend: "none",
          }
        - {
            name: "Ubuntu 18.04 Python", artifact: "linux-gcc.tar.xz",
            os: ubuntu-18.04,
            cc: "gcc", cxx: "g++",
            python: "true",
            backend: "none"     
          }
        - {
            name: "Ubuntu 18.04 CUDA", artifact: "linux-gcc.tar.xz",
            os: ubuntu-18.04,
            cc: "gcc", cxx: "g++",
            python: "false",
            backend: "cuda"
	    cudaos: 'ubuntu1804'
          }
    steps:
    - uses: actions/checkout@v2

    - name: Package Install
      run: sudo apt install gfortran libhdf5-openmpi-dev libhdf5-openmpi-100 hdf5-helpers tcl-dev tk-dev

    - name: Directory Setup
      run: |
        mkdir -p $PWD/install
        echo "PARFLOW_DIR=$PWD/install" >> $GITHUB_ENV
        echo "Setting PARFLOW_DIR=$PWD/install"

    - name: CMake Install
      run: |
        wget --no-check-certificate http://cmake.org/files/v3.14/cmake-3.14.0-Linux-x86_64.tar.gz
        tar -xf cmake-3.14.0-Linux-x86_64.tar.gz
        echo "$PWD/cmake-3.14.0-Linux-x86_64/bin/" >> $GITHUB_PATH

    - name: CUDA Install
      if: matrix.config.backend == 'cuda'
      run: |
        CUDA_SHORT=10.1
        CUDA_VER=10.1.105-1
        wget http://developer.download.nvidia.com/compute/cuda/repos/${{ matrix.config.cudaos }}/x86_64/cuda-repo-${{ matrix.config.cudaos }}_${CUDA_VER}_amd64.deb
        sudo dpkg -i cuda-repo-${{ matrix.config.cudaos }}_${CUDA_VER}_amd64.deb;
        sudo apt-key adv --fetch-keys http://developer.download.nvidia.com/compute/cuda/repos/${{ matrix.config.cudaos }}/x86_64/7fa2af80.pub
        sudo apt update -qq
        sudo apt install -y cuda-core-${CUDA_SHORT/./-} cuda-cudart-dev-${CUDA_SHORT/./-} cuda-nvtx-${CUDA_SHORT/./-}
        echo "CUDA_HOME=/usr/local/cuda-${CUDA_SHORT} >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=${CUDA_HOME}/lib64:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
        echo "LIBRARY_PATH=${CUDA_HOME}/lib64/stubs" >> $GITHUB_ENV
        echo "${CUDA_HOME}/bin" >> $GITHUB_PATH

    - name: UCX
      if: matrix.config.backend == 'cuda'
      run: |
        sudo apt install -y autoconf automake libtool
        wget https://github.com/openucx/ucx/releases/download/v1.8.0-rc1/ucx-1.8.0.tar.gz
        tar -xf ucx-1.8.0.tar.gz
        cd ucx-1.8.0
        ./contrib/configure-release --with-cuda=$CUDA_HOME --with-java=no --disable-numa --prefix=$PARFLOW_DIR 
        make install

    - name: OpenMPI Install for CUDA
      if: matrix.config.cc == 'cuda'
      run: |
        wget https://download.open-mpi.org/release/open-mpi/v4.0/openmpi-4.0.3.tar.gz
        tar -xf openmpi-4.0.3.tar.gz
        cd openmpi-4.0.3
        ./configure --with-cuda=$CUDA_HOME --with-ucx=$PARFLOW_DIR
        sudo make install
        cd ..
        sudo ldconfig

    - name: RMM Install
      if: matrix.config.cc == 'cuda'
      run: |
        git clone -b branch-0.10 --single-branch --recurse-submodules https://github.com/rapidsai/rmm.git
        cd rmm
        cmake . -DCMAKE_INSTALL_PREFIX=$PARFLOW_DIR
        make install

    - name: SILO Install
      run: |
        wget https://wci.llnl.gov/content/assets/docs/simulation/computer-codes/silo/silo-4.10.2/silo-4.10.2.tar.gz
        tar -xf silo-4.10.2.tar.gz
        cd silo-4.10.2
        ./configure --disable-silex --disable-hzip --disable-fpzip --prefix=$PARFLOW_DIR
        make install 

    - name: HYPRE Install
      run: |
        wget https://github.com/hypre-space/hypre/archive/v2.18.2.tar.gz
        tar -xf v2.18.2.tar.gz 
        cd hypre-2.18.2/src 
        ./configure --prefix=$PARFLOW_DIR
        make install

    - name: ParFlow CMake Configure
      run: |
        if [[ '${{ matrix.config.backend }}' == 'cuda' ]]; then
          CUDA_FLAGS='-lcuda'
          RMM_FLAGS="-DRMM_ROOT=$PARFLOW_DIR"
        else
          CUDA_FLAGS="" 
        fi
        cmake -Bbuild -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=${{ matrix.config.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} -DCMAKE_C_FLAGS='-Wall -Werror -Wno-unused-result -Wno-unused-function $CUDA_GLAGS' -DPARFLOW_ENABLE_TIMING=TRUE -DPARFLOW_AMPS_LAYER=mpi1 -DMPIEXEC_POSTFLAGS='--oversubscribe' -DPARFLOW_ACCELERATOR_BACKEND=${{ matrix.config.backend }} -DPARFLOW_AMPS_SEQUENTIAL_IO=true -DPARFLOW_HAVE_CLM=ON -DHYPRE_ROOT=$PARFLOW_DIR -DSILO_ROOT=$PARFLOW_DIR -DPARFLOW_ENABLE_PYTHON=${{ matrix.config.python }} -DPARFLOW_PYTHON_VIRTUAL_ENV=${{ matrix.config.python }} $RMM_FLAGS -DCMAKE_INSTALL_PREFIX=$PARFLOW_DIR

    - name: ParFlow CMake Build
      run: (cd build; make install)

    - name: ParFlow CTest
      run: (cd build; ctest)
